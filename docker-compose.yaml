services:
  catalogue:
    build: ./catalogue
    image: rreddygang/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: rreddygang/user:1.0.0
    container_name: user
    depends_on:
      - redis
  frontend:
    build: ./frontend
    image: rreddygang/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user

  mongodb:
    build: ./mongodb
    image: rreddygang/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create the network manually.
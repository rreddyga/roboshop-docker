services:
  catalogue:
    build:
      dockerfile: catalogue.Dockerfile
    image: rreddygang/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  mongodb:
    build:
      dockerfile: mongodb.Dockerfile
    image: rreddygang/mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create the network manually.
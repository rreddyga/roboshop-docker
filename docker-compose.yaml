services:
  catalogue:
    build: ./catalogue
    image: rreddygang/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: rreddygang/user:1.0.0
    container_name: user
    depends_on:
      - redis
      - mongodb
  cart:
    build: ./cart
    image: rreddygang/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
      - catalogue
  shipping:
    build: ./shipping
    image: rreddygang/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
      - cart
  payment:
    build: ./payment
    image: rreddygang/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USRER_HOST: "user"
      USRER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_PORT: "5672"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
      - rabbitmq
      - cart
      - user
  frontend:
    build: ./frontend
    image: rreddygang/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment

  mongodb:
    build: ./mongodb
    image: rreddygang/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: rreddygang/mysql:1.0.0
    container_name: mysql
  rabbitmq:
    image: rabbitmq:3
    environment:
      - RABBITMQ_DEFAULT_USER= roboshop
      - RABBITMQ_DEFAULT_PASS= roboshop123
    container_name: rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create the network manually.
services:
  catalogue:
    build: ./catalogue
    image: rreddygang/catalogue:1.0.0
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: rreddygang/user:1.0.0
    container_name: user
    depends_on:
      - redis
  cart:
    build: ./cart
    image: rreddygang/cart:1.0.0
    container_name: cart
    depends_on:
      - redis
  shipping:
    build: ./shipping
    image: rreddygang/shipping:1.0.0
    container_name: shipping
    depends_on:
      - mysql
  frontend:
    build: ./frontend
    image: rreddygang/frontend:1.0.0
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping

  mongodb:
    build: ./mongodb
    image: rreddygang/mongodb:1.0.0
    container_name: mongodb
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build: ./mysql
    image: rreddygang/mysql:1.0.0
    container_name: mysql

networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create the network manually.